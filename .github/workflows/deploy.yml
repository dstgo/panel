name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          node-version: 20

      - name: Pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
